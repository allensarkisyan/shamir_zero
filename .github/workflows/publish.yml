name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]*"
permissions:
  contents: read

jobs:
  publish:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # === Pre-publish quality gates ===
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --verbose

      # === Extract crate name/version reliably (no hardcoding) ===
      - name: Extract crate metadata
        id: meta
        run: |
          CRATE_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          GIT_TAG="${GITHUB_REF#refs/tags/}"

          echo "crate_name=$CRATE_NAME" >> $GITHUB_OUTPUT
          echo "crate_version=$CRATE_VERSION" >> $GITHUB_OUTPUT
          echo "git_tag=$GIT_TAG" >> $GITHUB_OUTPUT

          echo "Crate name    : $CRATE_NAME"
          echo "Crate version : v$CRATE_VERSION"
          echo "Git tag       : $GIT_TAG"

          if [ "v$CRATE_VERSION" != "$GIT_TAG" ]; then
            echo "❌ Version mismatch! Cargo.toml version must match the tag exactly."
            exit 1
          fi
          echo "✅ Version match confirmed"
        shell: bash

      # === Package the .crate file ===
      - name: Package .crate file
        run: cargo package --locked

      # === Generate CycloneDX SBOM ===
      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p target/sbom
          cargo install cargo-sbom --locked
          cargo sbom --output-format=cyclone_dx_json_1_6 > target/sbom/sbom.cdx.json

      # === Sign the .crate with cosign (keyless + Sigstore) ===
      - name: Sign .crate with cosign (keyless)
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - name: Cosign sign the crate
        run: |
          CRATE_FILE="target/package/${{ steps.meta.outputs.crate_name }}-${{ steps.meta.outputs.crate_version }}.crate"
          cosign sign-blob --yes --bundle "${CRATE_FILE}.sigstore.json" "$CRATE_FILE"
        env:
          COSIGN_EXPERIMENTAL: 1

      # === Trusted Publishing to crates.io ===
      - name: Authenticate with crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish --verbose --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # === Cryptographic attestation (Sigstore/SLSA/GitHub provenance + SBOM) ===
      - name: Attest build provenance and SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: "target/package/${{ steps.meta.outputs.crate_name }}-${{ steps.meta.outputs.crate_version }}.crate"
          sbom-path: "target/sbom/sbom.cdx.json"

      # === Create GitHub Release (only on tag push) ===
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3
        with:
          name: ${{ steps.meta.outputs.git_tag }}
          tag_name: ${{ steps.meta.outputs.git_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            target/package/${{ steps.meta.outputs.crate_name }}-${{ steps.meta.outputs.crate_version }}.crate
            target/package/${{ steps.meta.outputs.crate_name }}-${{ steps.meta.outputs.crate_version }}.crate.sigstore.json
            target/sbom/sbom.cdx.json
